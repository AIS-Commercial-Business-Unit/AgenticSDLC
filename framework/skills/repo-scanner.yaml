name: repo-scanner
display_name: Repository Scanner
description: >
  Scans a repository's directory structure and returns structured metadata about the
  codebase: file counts by type, top-level directory layout, detected technology stack,
  package manifests found, and estimated lines of code per language.
version: "1.0.0"
inputs:
  - name: repo_path
    type: string
    required: true
    description: Absolute or relative path to the repository root to scan.
  - name: max_depth
    type: integer
    required: false
    default: 5
    description: Maximum directory depth to traverse.
  - name: include_patterns
    type: array
    required: false
    description: Glob patterns for files to include. Defaults to all files.
  - name: exclude_patterns
    type: array
    required: false
    description: Glob patterns to exclude (e.g., node_modules, .git).
outputs:
  - name: directory_tree
    type: object
    description: Nested directory structure up to max_depth.
  - name: file_counts_by_extension
    type: object
    description: Map of file extension to count (e.g., {".java": 142, ".yaml": 38}).
  - name: detected_stack
    type: array
    description: Inferred technology stack entries (e.g., ["Java", "Apache Camel", "Kafka"]).
  - name: manifest_files
    type: array
    description: Paths to detected package/build manifests (pom.xml, package.json, etc.).
  - name: total_files
    type: integer
    description: Total number of files scanned.
example_usage: |
  # Used by brownfield-assessor-agent during Intake step
  skill: repo-scanner
  inputs:
    repo_path: /workspace/legacy-system
    max_depth: 4
    exclude_patterns: ["**/node_modules/**", "**/.git/**"]
