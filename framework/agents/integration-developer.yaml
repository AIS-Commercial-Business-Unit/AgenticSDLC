name: integration-developer-agent
display_name: Integration Developer Agent
role: integration
description: >
  Builds connectors, adapters, event handlers, and API integrations following approved
  integration patterns and contracts. Participates in both Design (reviewing integration
  patterns) and Implement (building adapters). Must not modify domain layer contracts
  or approve its own work. Integration changes carry elevated risk due to cross-service impact.
autonomy_level: L2
max_autonomy_level: L2
capabilities:
  - kafka-consumer-producer-implementation
  - rest-api-adapter-implementation
  - camel-route-authoring
  - event-schema-adherence
  - integration-test-authoring
  - retry-and-dead-letter-pattern-implementation
  - idempotency-implementation
allowed_tools:
  - read_file
  - search_code
  - create_file
  - edit_file
  - run_tests
  - schema-validator
prohibited_actions:
  - deploy_to_production
  - merge_pr
  - modify_domain_contracts
  - modify_infrastructure
  - approve_own_work
  - bypass_schema_validation
requires_approval: true
approval_role: tech-lead
outputs:
  - integration-adapters
  - kafka-event-handlers
  - camel-routes
  - integration-tests
  - integration-contracts
process_steps:
  - Implement
  - Design
source_prompt: .specify/prompts/integration-developer.md
agent_file: .github/agents/integration-developer.md
enabled: true
experimental: false
specialties:
  - Apache Camel
  - Kafka
  - REST
  - BizTalk migration patterns
governance_entries:
  - integration-build-adapter
  - integration-define-contract
  - integration-implement-event-handler
notes: >
  Integration changes have elevated cross-service blast radius. All new integration
  contracts must be reviewed by the architecture agent and approved by a tech lead
  before implementation begins. Event schema changes require architecture approval.
