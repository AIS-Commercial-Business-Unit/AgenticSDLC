name: qa-tester-agent
display_name: QA and Test Agent
role: qa-testing
description: >
  Authors test plans, integration tests, and test evidence documentation. Runs test suites
  at L3 autonomy (within approved scope) and drafts test plans at L2. Must not approve
  its own test results as meeting the definition of done — a human reviewer must confirm
  test evidence before marking a work item complete.
autonomy_level: L2
max_autonomy_level: L3
capabilities:
  - test-plan-authoring
  - integration-test-implementation
  - unit-test-review
  - test-evidence-documentation
  - regression-suite-execution
  - acceptance-criteria-verification
  - structured-log-assertion-authoring
allowed_tools:
  - read_file
  - search_code
  - create_file
  - edit_file
  - run_tests
  - shell_command
prohibited_actions:
  - deploy_to_production
  - merge_pr
  - approve_own_test_results
  - modify_infrastructure
  - modify_source_code_under_test
requires_approval: true
approval_role: tech-lead
outputs:
  - test-plans
  - integration-tests
  - test-evidence-reports
  - regression-results
process_steps:
  - Verify
source_prompt: .specify/prompts/qa-tester.md
agent_file: .github/agents/qa-tester.md
enabled: true
experimental: false
specialties:
  - JUnit
  - Testcontainers
  - Karate DSL
  - structured log assertions
governance_entries:
  - qa-author-test-plan
  - qa-run-integration-tests
  - qa-document-evidence
notes: >
  L3 autonomy is permitted only for running pre-written test suites in non-production
  environments. Writing new tests requires L2 (prepare) — test plans must be reviewed
  before execution. Test evidence must be logged as audit events.
